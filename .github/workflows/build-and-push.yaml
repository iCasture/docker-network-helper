name: Build and Push Docker Images

on:
  push:
    branches:
      - master
    paths:   # Trigger on changes to relevant files
      - Dockerfile.alpine
      - Dockerfile.debian
      - Dockerfile.debian-slim
      - Dockerfile.ubuntu
      - .github/workflows/build-and-push.yaml
    tags:   # Trigger when tags are created. Match format like v1.2.3 (semantic versioning).
      - 'v*.*.*'
  release:   # Trigger when a new release is published
    types:
      - published
  schedule:   # Auto-trigger on 1st and 15th of each month at 00:00 UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch:   # Manual trigger

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: mk
        name: Build matrix JSON from params
        run: |
          params=$(cat .github/build-params.json)
          alpineBaseVersion=$(jq -r '.alpineVersion' <<<"$params")
          debianBaseVersion=$(jq -r '.debianVersion' <<<"$params")
          ubuntuBaseVersion=$(jq -r '.ubuntuVersion' <<<"$params")
          alpinePlatforms=$(jq -r '.alpinePlatforms' <<<"$params")
          debianPlatforms=$(jq -r '.debianPlatforms' <<<"$params")
          ubuntuPlatforms=$(jq -r '.ubuntuPlatforms' <<<"$params")

          matrix=$(jq -n --arg alpineBaseVersion "$alpineBaseVersion" \
                         --arg debianBaseVersion "$debianBaseVersion" \
                         --arg ubuntuBaseVersion "$ubuntuBaseVersion" \
                         --arg alpinePlatforms "$alpinePlatforms" \
                         --arg debianPlatforms "$debianPlatforms" \
                         --arg ubuntuPlatforms "$ubuntuPlatforms" \
            '{include: [
              { "variant": ("alpine" + $alpineBaseVersion),  "base-type": "alpine",      "platforms":$alpinePlatforms },
              { "variant": $debianBaseVersion,               "base-type": "debian",      "platforms":$debianPlatforms },
              { "variant": ($debianBaseVersion + "-slim"),   "base-type": "debian-slim", "platforms":$debianPlatforms },
              { "variant": $ubuntuBaseVersion,               "base-type": "ubuntu",      "platforms":$ubuntuPlatforms }
            ]}')

          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  build-and-push-basic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: prepare
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check event source
        run: |
          echo "Triggered by: ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker build environment
        uses: ./.github/actions/setup-docker
        with:
          platforms: all

      - name: Log in to registries
        uses: ./.github/actions/login-registries
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        id: set-build-metadata
        uses: ./.github/actions/set-build-metadata

      - name: Set image tags for basic
        id: set-tags-basic
        uses: ./.github/actions/set-image-tags
        with:
          variant: ${{ matrix.variant }}
          base-type: ${{ matrix['base-type'] }}
          target: basic
          sha: ${{ steps.set-build-metadata.outputs['sha-short'] }}
          owner-lowercase: ${{ steps.set-build-metadata.outputs['owner-lowercase'] }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build and push Docker image (basic version)
        uses: docker/build-push-action@v6
        with:
          context: .                                          # Build context is current directory
          file: ./Dockerfile.${{ matrix['base-type'] }}       # Use the variant-specific Dockerfile
          target: basic                                       # Build basic target only
          pull: true                                          # Always pull the latest base image
          push: true                                          # Push the image to registry after build
          platforms: ${{ matrix.platforms }}                  # Target multi-platform builds
          tags: ${{ steps.set-tags-basic.outputs.tags }}
          cache-from: type=gha,scope=docker-network-helper-${{ github.run_id }}-${{ github.run_attempt }}
          cache-to:   type=gha,mode=max,scope=docker-network-helper-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |                                       # Force rebuild each workflow run by using BUILD_EPOCH as a cache-busting argument
            MAINTAINER=${{ steps.set-build-metadata.outputs['owner'] }}
            DISTRO=${{ matrix['base-type'] }}
            DISTRO_VERSION=${{ matrix.variant }}
            PLATFORMS=${{ matrix.platforms }}
            BUILD_TARGET=basic
            BUILD_TIMESTAMP=${{ steps.set-build-metadata.outputs['timestamp'] }}
            BUILD_EPOCH=${{ github.run_id }}-${{ github.run_attempt }}
            GIT_COMMIT=${{ steps.set-build-metadata.outputs['sha-short'] }}

  build-and-push-standard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [prepare, build-and-push-basic]
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check event source
        run: |
          echo "Triggered by: ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker build environment
        uses: ./.github/actions/setup-docker
        with:
          platforms: all

      - name: Log in to registries
        uses: ./.github/actions/login-registries
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        id: set-build-metadata
        uses: ./.github/actions/set-build-metadata

      - name: Set image tags for standard
        id: set-tags-standard
        uses: ./.github/actions/set-image-tags
        with:
          variant: ${{ matrix.variant }}
          base-type: ${{ matrix['base-type'] }}
          target: standard
          sha: ${{ steps.set-build-metadata.outputs['sha-short'] }}
          owner-lowercase: ${{ steps.set-build-metadata.outputs['owner-lowercase'] }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build and push Docker image (standard version)
        uses: docker/build-push-action@v6
        with:
          context: .                                          # Build context is current directory
          file: ./Dockerfile.${{ matrix['base-type'] }}       # Use the variant-specific Dockerfile
          target: standard                                    # Build standard target
          pull: true                                          # Always pull the latest base image
          push: true                                          # Push the image to registry after build
          platforms: ${{ matrix.platforms }}                  # Target multi-platform builds
          tags: ${{ steps.set-tags-standard.outputs.tags }}
          cache-from: type=gha,scope=docker-network-helper-${{ github.run_id }}-${{ github.run_attempt }}
          cache-to:   type=gha,mode=max,scope=docker-network-helper-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |                                       # Force rebuild each workflow run by using BUILD_EPOCH as a cache-busting argument
            BUILD_TARGET=standard
            BUILD_TIMESTAMP=${{ steps.set-build-metadata.outputs['timestamp'] }}
            BUILD_EPOCH=${{ github.run_id }}-${{ github.run_attempt }}
            GIT_COMMIT=${{ steps.set-build-metadata.outputs['sha-short'] }}

  build-and-push-advanced:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [prepare, build-and-push-standard]
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check event source
        run: |
          echo "Triggered by: ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker build environment
        uses: ./.github/actions/setup-docker
        with:
          platforms: all

      - name: Log in to registries
        uses: ./.github/actions/login-registries
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        id: set-build-metadata
        uses: ./.github/actions/set-build-metadata

      - name: Set image tags for advanced
        id: set-tags-advanced
        uses: ./.github/actions/set-image-tags
        with:
          variant: ${{ matrix.variant }}
          base-type: ${{ matrix['base-type'] }}
          target: advanced
          sha: ${{ steps.set-build-metadata.outputs['sha-short'] }}
          owner-lowercase: ${{ steps.set-build-metadata.outputs['owner-lowercase'] }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build and push Docker image (advanced version)
        uses: docker/build-push-action@v6
        with:
          context: .                                          # Build context is current directory
          file: ./Dockerfile.${{ matrix['base-type'] }}       # Use the variant-specific Dockerfile
          target: advanced                                    # Build advanced target
          pull: true                                          # Always pull the latest base image
          push: true                                          # Push the image to registry after build
          platforms: ${{ matrix.platforms }}                  # Target multi-platform builds
          tags: ${{ steps.set-tags-advanced.outputs.tags }}
          cache-from: type=gha,scope=docker-network-helper-${{ github.run_id }}-${{ github.run_attempt }}
          cache-to:   type=gha,mode=max,scope=docker-network-helper-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |                                       # Force rebuild each workflow run by using BUILD_EPOCH as a cache-busting argument
            BUILD_TARGET=advanced
            BUILD_TIMESTAMP=${{ steps.set-build-metadata.outputs['timestamp'] }}
            BUILD_EPOCH=${{ github.run_id }}-${{ github.run_attempt }}
            GIT_COMMIT=${{ steps.set-build-metadata.outputs['sha-short'] }}
